name: Develop Branch - Deploy to Dev

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 533267129063.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: nodejs-dev-repo
  ECS_CLUSTER: nodejs-cluster
  ECS_SERVICE: nodejs-dev-service
  TASK_DEFINITION: nodejs-dev-td

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest

    # This gives GitHub Actions permission to get AWS token via OIDC
    permissions:
      id-token: write   # OIDC token
      contents: read

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install & Test
      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      # Step 4: Connect to AWS using OIDC (no passwords needed!)
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::533267129063:role/github-actions-role
          aws-region: us-east-1

      # Step 5: Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Step 6: Build, Tag and Push Docker image to ECR
      - name: Build, Tag & Push Image to ECR
        id: build-image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 7: Download existing task definition
      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION \
            --query taskDefinition > task-definition.json

      # Step 8: Update task definition with new image
      - name: Update ECS Task Definition with New Image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: nodejs-dev-container
          image: ${{ steps.build-image.outputs.image }}

      # Step 9: Deploy to ECS
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true